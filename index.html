<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Memory Rooms</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%231a1a2e'/><text x='16' y='22' font-size='20' text-anchor='middle' fill='%23ddccaa'>M</text></svg>">
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      font-family: system-ui, sans-serif;
    }
    canvas { display: block; }
    #info {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #fff;
      font-size: 14px;
      opacity: 0.7;
      pointer-events: none;
    }
    #VRButton {
      left: auto !important;
      right: 20px !important;
    }
    #controls {
      position: fixed;
      bottom: 16px;
      left: 16px;
      color: #aab;
      font-size: 12px;
      line-height: 1.7;
      pointer-events: none;
      opacity: 0.6;
    }
    #controls kbd {
      display: inline-block;
      background: rgba(255,255,255,0.12);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 3px;
      padding: 1px 5px;
      font-family: inherit;
      font-size: 11px;
      min-width: 18px;
      text-align: center;
    }
    #loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #ccc;
      font-family: Georgia, serif;
      transition: opacity 0.6s;
    }
    #loading-overlay.fade-out { opacity: 0; pointer-events: none; }
    #loading-title {
      font-size: 36px;
      font-style: italic;
      color: #ddccaa;
      margin-bottom: 32px;
    }
    #loading-status { font-size: 18px; margin-bottom: 16px; }
    #loading-bar-bg {
      width: 320px;
      height: 8px;
      background: #333;
      border-radius: 4px;
      overflow: hidden;
    }
    #loading-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #44aaff, #ddccaa);
      border-radius: 4px;
      transition: width 0.3s;
    }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div id="loading-title">Memory Rooms</div>
    <div id="loading-status">Loading videos…</div>
    <div id="loading-bar-bg"><div id="loading-bar"></div></div>
  </div>
  <div id="info">Loading…</div>
  <div id="controls">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> Move &nbsp;
    <kbd>Q</kbd><kbd>E</kbd> Up/Down &nbsp;
    Scroll to zoom<br>
    Drag to look &nbsp; Click floor to teleport &nbsp; Click frame to play
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
